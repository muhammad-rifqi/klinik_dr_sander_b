<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registrasi MCU</title>

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

  <style>
    body {
      background: linear-gradient(135deg, #eef2f3, #dfe9f3);
      font-family: 'Segoe UI', sans-serif;
    }

    .card-custom {
      border-radius: 15px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.1);
      overflow: hidden;
    }

    .sidebar {
      background: #f5f6f7;
      padding: 30px;
      height: 100%;
    }

    .nav-pills .nav-link {
      border-radius: 12px;
      color: #333;
      padding: 15px;
      margin-bottom: 10px;
      transition: 0.3s;
    }

    .nav-pills .nav-link.active {
      background: #0d6efd;
      color: white;
    }

    .nav-pills .nav-link i {
      margin-right: 10px;
    }

    .form-control, .form-select {
      border-radius: 10px;
      padding-left: 40px;
    }

    .input-group-text {
      border-radius: 10px 0 0 10px;
      background: white;
    }

    .btn-submit {
      background: #0d6efd;
      color: white;
      border-radius: 10px;
      padding: 10px 30px;
    }

    .btn-cancel {
      background: #dc3545;
      color: white;
      border-radius: 10px;
      padding: 10px 30px;
    }

    footer {
      text-align: center;
      margin-top: 20px;
      font-size: 14px;
      color: #555;
    }
  </style>
</head>
<body>

<div class="container py-5">
  <div class="card card-custom">
    <div class="row g-0">

      <!-- Sidebar -->
      <div class="col-md-4 sidebar">

        <h4 class="mb-4"><b>Selamat Datang</b></h4>

        <div class="nav flex-column nav-pills" id="v-pills-tab" role="tablist">

          <button class="nav-link active"
                  id="tab-identitas"
                  data-bs-toggle="pill"
                  data-bs-target="#identitas"
                  type="button">

            <i class="bi bi-people-fill"></i>
            Identitas Diri
          </button>

          <button class="nav-link"
                  id="tab-anamnesa"
                  data-bs-toggle="pill"
                  data-bs-target="#anamnesa"
                  type="button">

            <i class="bi bi-clipboard-heart"></i>
            Anamnesa Mandiri
          </button>

        </div>
      </div>

      <!-- Content -->
      <div class="col-md-8 p-4">

        <div class="tab-content">

          <!-- TAB IDENTITAS -->
          <div class="tab-pane fade show active" id="identitas">

            <h5><b>Registrasi Peserta MCU Baru</b></h5>
            <small>Silahkan isi data dibawah ini :</small>

            <form class="mt-4">

              <div class="row mb-3">
                <div class="col">
                  <div class="input-group">
                    <span class="input-group-text">
                      <i class="bi bi-person"></i>
                    </span>
                    <input type="text" class="form-control" placeholder="Nama Depan">
                  </div>
                </div>

                <div class="col">
                  <div class="input-group">
                    <span class="input-group-text">
                      <i class="bi bi-person"></i>
                    </span>
                    <input type="text" class="form-control" placeholder="Nama Terakhir">
                  </div>
                </div>
              </div>

              <div class="row mb-3">

                <div class="col">
                  <div class="input-group">
                    <span class="input-group-text">
                      <i class="bi bi-gender-ambiguous"></i>
                    </span>

                    <select class="form-select">
                      <option>Jenis Kelamin</option>
                      <option>Laki-laki</option>
                      <option>Perempuan</option>
                    </select>
                  </div>
                </div>

                <div class="col">
                  <div class="input-group">
                    <span class="input-group-text">
                      <i class="bi bi-credit-card"></i>
                    </span>

                    <input type="text" class="form-control" placeholder="NIK KTP">
                  </div>
                </div>
              </div>

              <div class="row mb-3">

                <div class="col">
                  <div class="input-group">
                    <span class="input-group-text">
                      <i class="bi bi-calendar"></i>
                    </span>

                    <input type="date" class="form-control">
                  </div>
                </div>

                <div class="col">
                  <div class="input-group">
                    <span class="input-group-text">
                      <i class="bi bi-envelope"></i>
                    </span>

                    <input type="email" class="form-control" placeholder="Email">
                  </div>
                </div>
              </div>

              <div class="row mb-3">

                <div class="col">
                  <div class="input-group">
                    <span class="input-group-text">
                      <i class="bi bi-diagram-3"></i>
                    </span>

                    <input type="text" class="form-control" placeholder="Departemen">
                  </div>
                </div>

                <div class="col">
                  <div class="input-group">
                    <span class="input-group-text">
                      <i class="bi bi-phone"></i>
                    </span>

                    <input type="text" class="form-control" placeholder="No Telephone">
                  </div>
                </div>
              </div>

              <div class="mb-3">
                <div class="input-group">
                  <span class="input-group-text">
                    <i class="bi bi-card-text"></i>
                  </span>

                  <textarea class="form-control" rows="3" placeholder="Alamat"></textarea>
                </div>
              </div>

              <div class="text-end">
                <button type="submit" class="btn btn-submit">
                  Submit
                </button>

                <button type="reset" class="btn btn-cancel">
                  Cancel
                </button>
              </div>

            </form>
          </div>

          <!-- TAB ANAMNESA -->
          <div class="tab-pane fade" id="anamnesa">

            <h5><b>Form Anamnesa Mandiri</b></h5>
            <small>Silahkan isi kondisi kesehatan Anda :</small>

            <form class="mt-4">

              <div class="mb-3">
                <label class="form-label">Apakah Anda Merokok?</label>
                <select class="form-select">
                  <option>Pilih</option>
                  <option>Ya</option>
                  <option>Tidak</option>
                </select>
              </div>

              <div class="mb-3">
                <label class="form-label">Riwayat Penyakit</label>
                <textarea class="form-control" rows="3"
                  placeholder="Contoh : Diabetes, Hipertensi"></textarea>
              </div>

              <div class="mb-3">
                <label class="form-label">Apakah Sedang Konsumsi Obat?</label>
                <input type="text" class="form-control"
                  placeholder="Nama obat">
              </div>

              <div class="mb-3">
                <label class="form-label">Keluhan Saat Ini</label>
                <textarea class="form-control" rows="3"
                  placeholder="Tuliskan keluhan Anda"></textarea>
              </div>

              <div class="text-end">
                <button type="submit" class="btn btn-submit">
                  Simpan
                </button>

                <button type="reset" class="btn btn-cancel">
                  Reset
                </button>
              </div>

            </form>

          </div>

        </div>

      </div>
    </div>
  </div>

  <footer>
    © 2026 Klinik dr Sander B - PT Daya Adicipta Medika. All Rights Reserved.
  </footer>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
